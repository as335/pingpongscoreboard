        :root {
            /* 使用動態視窗高度單位，解決手機工具列遮擋問題 */
            --app-height: 100svh;
        }

        body {
            background-color: #000;
            color: white;
            height: var(--app-height);
            margin: 0;
            padding: 0;
            overflow: hidden; /* 禁止捲動 */
            font-family: sans-serif;

        .score-font {
            font-family: 'Orbitron', sans-serif;
            /* clamp(最小, 首選, 最大) 確保數字永遠在範圍內 */
            font-size: clamp(80px, 25vh, 200px); 
            line-height: 1;
        }

        .serving-active {
            border-color: #22c55e !important;
            background: rgba(34, 197, 94, 0.05);
            box-shadow: inset 0 0 20px rgba(34, 197, 94, 0.2);
        }

        /* 針對手機點擊進行優化，防止雙擊縮放延遲 */
        button { touch-action: manipulation; }
    </style>
</head>

    <div id="setup-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/95 p-4">

                    <button onclick="setMode(3)" class="mode-btn bg-green-500 text-white p-2 rounded-lg border-2 border-green-600">5戰3勝</button>
                </div>
                <button onclick="startGame()" class="w-full bg-green-600 text-white py-3 rounded-xl text-xl font-bold mt-2">開始比賽</button>
            </div>
        </div>
    </div>

    <div class="h-[15vh] flex flex-col justify-center items-center">
        <p class="text-yellow-400 text-xs tracking-widest font-bold">SETS</p>
        <div id="sets-display" class="text-4xl font-bold text-yellow-400 score-font">0 : 0</div>
    </div>

    <div class="flex-1 flex gap-2 min-h-0">
        <div id="p1-card" class="flex-1 border-2 border-zinc-800 rounded-2xl flex flex-col items-center justify-around py-4 transition-all">
            <div id="p1-serve" class="text-green-500 font-bold opacity-0 text-sm tracking-widest">● SERVING</div>
            <h2 id="p1-name-display" class="text-lg font-bold truncate w-full text-center px-1">選手 A</h2>
            <div id="p1-score" class="score-font">0</div>
            <button onclick="addScore(1)" class="w-[85%] bg-blue-600 active:bg-blue-500 py-6 rounded-xl text-2xl font-bold shadow-lg">得分 +1</button>
            <button id="p1-timeout" onclick="useTimeout(1)" class="text-zinc-500 text-xs underline">暫停 (Timeout)</button>
        </div>

        <div id="p2-card" class="flex-1 border-2 border-zinc-800 rounded-2xl flex flex-col items-center justify-around py-4 transition-all">
            <div id="p2-serve" class="text-green-500 font-bold opacity-0 text-sm tracking-widest">● SERVING</div>
            <h2 id="p2-name-display" class="text-lg font-bold truncate w-full text-center px-1">選手 B</h2>
            <div id="p2-score" class="score-font">0</div>
            <button onclick="addScore(2)" class="w-[85%] bg-blue-600 active:bg-blue-500 py-6 rounded-xl text-2xl font-bold shadow-lg">得分 +1</button>
            <button id="p2-timeout" onclick="useTimeout(2)" class="text-zinc-500 text-xs underline">暫停 (Timeout)</button>
        </div>
    </div>

    <div class="h-[10vh] flex items-center justify-center">
        <button onclick="location.reload()" class="bg-red-950/30 text-red-500 px-6 py-2 rounded-full border border-red-900 text-xs">
            ❌ 結束比賽並重新設定
        </button>
    </div>

    <script>
        let p1Score = 0, p2Score = 0, p1Sets = 0, p2Sets = 0;
        let winningSetsNeeded = 3, firstServer = 1, currentServer = 1;
        let p1TimeoutUsed = false, p2TimeoutUsed = false;

        function setMode(sets) {
            winningSetsNeeded = sets;
            document.querySelectorAll('.mode-btn').forEach(b => {
                b.className = "mode-btn bg-gray-100 p-2 rounded-lg border-2 border-transparent";
            });
            event.target.className = "mode-btn bg-green-500 text-white p-2 rounded-lg border-2 border-green-600";
        }

        function startGame() {
            document.getElementById('p1-name-display').innerText = document.getElementById('p1-name-input').value || "選手 A";
            document.getElementById('p2-name-display').innerText = document.getElementById('p2-name-input').value || "選手 B";

</head>
<body class="fixed inset-0 flex flex-col items-center justify-center overflow-hidden bg-black text-white p-2">

    <div id="setup-modal" class="fixed inset-0 z-50 flex items-center justify-center setup-overlay p-4">
        <div class="bg-white text-black rounded-3xl p-8 max-w-md w-full shadow-2xl">
            <h1 class="text-3xl font-bold mb-6 text-center text-gray-800">🏆 賽前設定</h1>
            
            <div class="space-y-4">
                <div>
                    <label class="block font-bold mb-1">左側選手 (Player A)</label>
                    <input type="text" id="p1-name-input" value="選手 A" class="w-full border-2 border-gray-200 rounded-lg p-3 outline-none focus:border-green-500">
                </div>
                <div>
                    <label class="block font-bold mb-1">右側選手 (Player B)</label>
                    <input type="text" id="p2-name-input" value="選手 B" class="w-full border-2 border-gray-200 rounded-lg p-3 outline-none focus:border-green-500">
                </div>
                
                <div>
                    <label class="block font-bold mb-2">賽制選擇</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setMode(2)" class="mode-btn bg-gray-100 py-2 rounded-lg hover:bg-green-100 border-2 border-transparent">三戰二勝</button>
                        <button onclick="setMode(3)" class="mode-btn bg-green-500 text-white py-2 rounded-lg border-2 border-green-600">五戰三勝</button>
                    </div>
                </div>

                <div>
                    <label class="block font-bold mb-2">首局發球權</label>
                    <div class="flex gap-4">
                        <label class="flex-1 text-center border-2 p-2 rounded-lg cursor-pointer">
                            <input type="radio" name="server" value="1" checked class="mr-2"> 左側
                        </label>
                        <label class="flex-1 text-center border-2 p-2 rounded-lg cursor-pointer">
                            <input type="radio" name="server" value="2" class="mr-2"> 右側
                        </label>
                    </div>
                </div>

                <button onclick="startGame()" class="w-full bg-green-600 text-white text-xl font-bold py-4 rounded-xl hover:bg-green-700 transition transform active:scale-95 shadow-lg mt-4">
                    開始比賽
                </button>
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col md:flex-row gap-2 w-full h-full max-h-full overflow-hidden">
    
    <div id="p1-card" class="flex-1 border-2 rounded-2xl flex flex-col items-center justify-center p-2 min-h-0">
        <div id="p1-score" class="text-[25vw] md:text-[15rem] leading-none score-font">0</div>
        </div>

    <div id="p2-card" class="flex-1 border-2 rounded-2xl flex flex-col items-center justify-center p-2 min-h-0">
        <div id="p2-score" class="text-[25vw] md:text-[15rem] leading-none score-font">0</div>
        </div>
</div>

        <div class="flex-1 flex flex-row gap-4 lg:gap-10 items-stretch">
            <div id="p1-card" class="flex-1 border-4 border-gray-800 rounded-3xl flex flex-col items-center justify-center p-6 transition-all duration-300">
                <div id="p1-serve" class="text-green-500 font-bold mb-4 opacity-0 text-xl tracking-widest">● SERVING</div>
                <h2 id="p1-name-display" class="text-3xl font-bold mb-2">選手 A</h2>
                <div id="p1-score" class="text-[10rem] lg:text-[18rem] leading-none score-font mb-8">0</div>
                <button onclick="addScore(1)" class="w-full max-w-xs bg-blue-700 hover:bg-blue-600 text-white py-6 rounded-2xl text-4xl font-bold shadow-xl active:scale-95 transition">得分 +1</button>
                <button id="p1-timeout" onclick="useTimeout(1)" class="mt-6 text-gray-400 hover:text-white underline">暫停 (Timeout)</button>
            </div>

            <div id="p2-card" class="flex-1 border-4 border-gray-800 rounded-3xl flex flex-col items-center justify-center p-6 transition-all duration-300">
                <div id="p2-serve" class="text-green-500 font-bold mb-4 opacity-0 text-xl tracking-widest">● SERVING</div>
                <h2 id="p2-name-display" class="text-3xl font-bold mb-2">選手 B</h2>
                <div id="p2-score" class="text-[10rem] lg:text-[18rem] leading-none score-font mb-8">0</div>
                <button onclick="addScore(2)" class="w-full max-w-xs bg-blue-700 hover:bg-blue-600 text-white py-6 rounded-2xl text-4xl font-bold shadow-xl active:scale-95 transition">得分 +1</button>
                <button id="p2-timeout" onclick="useTimeout(2)" class="mt-6 text-gray-400 hover:text-white underline">暫停 (Timeout)</button>
            </div>
        </div>

        <div class="mt-8 text-center">
            <button onclick="location.reload()" class="bg-red-900/50 hover:bg-red-800 text-red-400 px-8 py-3 rounded-full border border-red-500 transition">
                ❌ 結束比賽並重新設定
            </button>
        </div>
    </div>

    <script>
        let p1Score = 0, p2Score = 0;
        let p1Sets = 0, p2Sets = 0;
        let winningSetsNeeded = 3;
        let firstServer = 1;
        let currentServer = 1;
        let p1TimeoutUsed = false;
        let p2TimeoutUsed = false;

        function setMode(sets) {
            winningSetsNeeded = sets;
            document.querySelectorAll('.mode-btn').forEach(b => {
                b.classList.remove('bg-green-500', 'text-white');
                b.classList.add('bg-gray-100', 'text-black');
            });
            event.target.classList.add('bg-green-500', 'text-white');
        }

        function startGame() {
            document.getElementById('p1-name-display').innerText = document.getElementById('p1-name-input').value || "選手 A";
            document.getElementById('p2-name-display').innerText = document.getElementById('p2-name-input').value || "選手 B";
            firstServer = parseInt(document.querySelector('input[name="server"]:checked').value);
            currentServer = firstServer;
            document.getElementById('setup-modal').style.display = 'none';
            updateDisplay();
        }

        function addScore(player) {
            if (player === 1) p1Score++;
            else p2Score++;
            
            calculateServer();
            checkRules();
            updateDisplay();
        }

        function calculateServer() {
            const total = p1Score + p2Score;
            const interval = (p1Score >= 10 && p2Score >= 10) ? 1 : 2;
            
            if (Math.floor(total / interval) % 2 === 0) {
                currentServer = firstServer;
            } else {
                currentServer = (firstServer === 1) ? 2 : 1;
            }
        }

        function checkRules() {
            const p1Win = p1Score >= 11 && (p1Score - p2Score >= 2);
            const p2Win = p2Score >= 11 && (p2Score - p1Score >= 2);

            if (p1Win || p2Win) {
                const winner = p1Win ? document.getElementById('p1-name-display').innerText : document.getElementById('p2-name-display').innerText;
                alert(`本局獲勝：${winner}`);
                
                if (p1Win) p1Sets++; else p2Sets++;
                
                p1Score = 0; p2Score = 0;
                firstServer = (firstServer === 1) ? 2 : 1;
                currentServer = firstServer;

                checkMatchOver();
            }
        }

        function checkMatchOver() {
            if (p1Sets === winningSetsNeeded || p2Sets === winningSetsNeeded) {
                const winner = p1Sets === winningSetsNeeded ? document.getElementById('p1-name-display').innerText : document.getElementById('p2-name-display').innerText;
                alert(`🏆 最終勝出：${winner}`);
                location.reload();
            }
        }

        function useTimeout(player) {
            if (player === 1 && !p1TimeoutUsed) {
                p1TimeoutUsed = true;
                document.getElementById('p1-timeout').innerText = "已使用暫停";
                document.getElementById('p1-timeout').disabled = true;
                alert(`${document.getElementById('p1-name-display').innerText} 要求暫停`);
            } else if (player === 2 && !p2TimeoutUsed) {
                p2TimeoutUsed = true;
                document.getElementById('p2-timeout').innerText = "已使用暫停";
                document.getElementById('p2-timeout').disabled = true;
                alert(`${document.getElementById('p2-name-display').innerText} 要求暫停`);
            }
        }

        function updateDisplay() {
            document.getElementById('p1-score').innerText = p1Score;
            document.getElementById('p2-score').innerText = p2Score;
            document.getElementById('sets-display').innerText = `${p1Sets} : ${p2Sets}`;

            // 發球顯示
            document.getElementById('p1-serve').style.opacity = (currentServer === 1) ? "1" : "0";
            document.getElementById('p2-serve').style.opacity = (currentServer === 2) ? "1" : "0";
            
            document.getElementById('p1-card').className = `flex-1 border-4 rounded-3xl flex flex-col items-center justify-center p-6 transition-all duration-300 ${currentServer === 1 ? 'serving-active border-green-500' : 'border-gray-800'}`;
            document.getElementById('p2-card').className = `flex-1 border-4 rounded-3xl flex flex-col items-center justify-center p-6 transition-all duration-300 ${currentServer === 2 ? 'serving-active border-green-500' : 'border-gray-800'}`;
        }
    </script>
</body>
</html>
